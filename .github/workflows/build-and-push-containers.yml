name: Build and push container images

on:
  workflow_dispatch:
    # Manual trigger so a maintainer can choose which service to build.
    inputs:
      service:
        description: 'Service to build'
        required: true
        default: 'gateway'
        type: choice
        options:
          - gateway
          - auth-api
          - email-api-v2
          - payment-api-v2
          - product-api
          - product-api-v2
          - shoppingcart-api
          - coupon-api
          - coupon-api-v2
          - web-frontend
      tag:
        description: 'Image tag (optional, defaults to latest)'
        required: false
        default: 'latest'
        type: string

permissions:
  contents: read          # allow checkout of repository contents
  packages: write         # allow pushing images to GitHub Packages / GHCR

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Fetch repository code so the workflow can build the project.
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
        # Install .NET 8 SDK required for building the solution.
      - name: Restore solution
        run: dotnet restore MicroservicesApo.sln
        # Restore NuGet packages for the entire solution.
      - name: Build solution
        run: dotnet build MicroservicesApo.sln --configuration Release --no-restore
        # Compile all projects in Release mode without restoring again.
      - name: Run tests
        run: dotnet test Apo.Messaging.Tests/Apo.Messaging.Tests.csproj --configuration Release --no-restore
        # Run messaging integration tests to verify the build.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Enable modern Docker build features and multi-platform support.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
        # Authenticate to GHCR so the workflow can push container images.
      - name: Get service config
        id: service-config
        run: |
          # Select the correct Dockerfile based on the service name.
          case "${{ inputs.service }}" in
            gateway)
              echo "dockerfile=Apo.Gateway/Dockerfile" >> $GITHUB_OUTPUT
              ;;
            auth-api)
              echo "dockerfile=Apo.Service.AuthAPI/Dockerfile" >> $GITHUB_OUTPUT
              ;;
            email-api-v2)
              echo "dockerfile=Apo.Service.EmailAPI_V2/Dockerfile" >> $GITHUB_OUTPUT
              ;;
            payment-api-v2)
              echo "dockerfile=Apo.Service.PaymentAPI_V2/Dockerfile" >> $GITHUB_OUTPUT
              ;;
            product-api)
              echo "dockerfile=Apo.Service.ProductAPI/Dockerfile" >> $GITHUB_OUTPUT
              ;;
            product-api-v2)
              echo "dockerfile=Apo.Service.ProductAPI_V2/Dockerfile" >> $GITHUB_OUTPUT
              ;;
            shoppingcart-api)
              echo "dockerfile=Apo.Service.ShoppingCartAPI/Dockerfile" >> $GITHUB_OUTPUT
              ;;
            coupon-api)
              echo "dockerfile=Apo.Services.CouponAPI/Dockerfile" >> $GITHUB_OUTPUT
              ;;
            coupon-api-v2)
              echo "dockerfile=Apo.Services.CouponAPI_V2/Dockerfile" >> $GITHUB_OUTPUT
              ;;
            web-frontend)
              echo "dockerfile=Apo.Web/Dockerfile" >> $GITHUB_OUTPUT
              ;;
          esac
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.service-config.outputs.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.service }}:${{ inputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.service }}:${{ github.sha }}
        # Build the selected image and push it to GHCR with both tag and commit SHA.
